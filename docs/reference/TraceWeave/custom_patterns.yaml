# custom_patterns.yaml
# Add custom runtime error formats here without changing Python code.
#
# Pattern fields:
#   name        : pattern identifier (English, no spaces)
#   regex       : Python regular expression
#                 Supported named capture groups:
#                   (?P<file>...)       source file path (optional)
#                   (?P<line>\d+)       source line number (optional)
#                   (?P<time>[\d.]+)    numeric time value (optional)
#                   (?P<time_unit>...)  time unit such as ps/ns/us (optional)
#                   (?P<message>.+)     error message (required)
#   severity    : ERROR / FATAL / WARNING
#   description : free-form comment for maintainers
#
# ──────────────────────────────────────────────────────────────────
# Example: add a custom checker format
# ──────────────────────────────────────────────────────────────────
# - name: my_custom_checker
#   severity: ERROR
#   description: "Custom bus protocol checker output"
#   regex: 'CHECKER_ERROR\s+\[(?P<message>[^\]]+)\]\s+@\s+(?P<time>[\d.]+)\s+(?P<time_unit>ns|ps)'

patterns: []

# ──────────────────────────────────────────────────────────────────
# Built-in format reference below. Read-only: built-in formats are hard-coded
# in log_parser.py and cannot be changed here.
# ──────────────────────────────────────────────────────────────────
# VCS assertion fail:
#   "file.sv", 66: hier.ASSERT_NAME: started at 290000ps failed at 310000ps
#       Offending '(expr)'
#
# Xcelium assertion fail:
#   xmsim: *E,ASRTST (file.sv,66): (time 270 NS) Assertion hier.ASSERT_NAME has failed
#
# UVM_ERROR / UVM_FATAL (same format for VCS and Xcelium):
#   UVM_ERROR file.sv(129) @ 1429.000 ns: reporter [TAG] message
#   UVM_FATAL file.sv(129) @ 1429.000 ns: reporter [TAG] message
